<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detector</title>
</head>
<body>
    <h1>Emotion Detector</h1>
    <form id="emotionForm">
        <label for="textToAnalyze">Enter text to analyze:</label><br><br>
        <input type="text" id="textToAnalyze" size="50"><br><br>
        <button type="button" onclick="runEmotionDetection()">Run Emotion Detection</button>
    </form>
    <p id="response"></p>
    <script>
        function runEmotionDetection() {
            const text = document.getElementById("textToAnalyze").value;
            fetch("/emotionDetector?textToAnalyze=" + encodeURIComponent(text))
                .then(res => res.text())
                .then(data => {
                    document.getElementById("response").innerText = data;
                });
        }
    </script>
</body>
</html>
